<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flight Assistant — Evan Burkeen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:ital,wght@0,600;1,600&display=swap" rel="stylesheet" />
  <script src="/world.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    :root {
      --bg: #f7eed2;
      --ink: #1c1a15;
      --line: rgba(28, 26, 21, 0.14);
      --panel: rgba(255, 255, 255, 0.55);
      --accent: #b1471f;
      --accent-dark: #8a3416;
      --good: #3c6e2f;
      --good-bg: rgba(60, 110, 47, 0.10);
      --info: #1e40af;
      --info-bg: rgba(30, 64, 175, 0.08);
      --warn: #92400e;
      --warn-bg: rgba(146, 64, 14, 0.10);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      background-image: radial-gradient(circle at 85% -10%, rgba(177, 71, 31, 0.08), transparent 45%);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; }
    button, input, textarea { font-family: inherit; }

    .container { max-width: 58rem; margin: 0 auto; padding: 2.5rem 1.5rem; }

    .header { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: flex-end; gap: 1rem; flex-wrap: wrap; }
    .header h1 {
      font-family: Fraunces, Georgia, serif;
      font-size: 2.5rem; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 0.3rem;
    }
    .header h1 em { font-style: italic; color: var(--accent); }
    .header p { font-size: 0.9rem; opacity: 0.72; }

    .view-toggle {
      display: inline-flex; border: 1px solid var(--line); border-radius: 999px;
      overflow: hidden; background: var(--panel); flex: none; margin-bottom: 0.35rem;
    }
    .view-toggle button {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
      padding: 0.4rem 0.9rem; border: none; background: transparent; color: var(--ink);
      cursor: pointer; transition: all 0.15s; opacity: 0.65;
    }
    .view-toggle button.active { background: var(--ink); color: var(--bg); opacity: 1; }

    .compact-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(13rem, 1fr));
      gap: 0.5rem;
    }
    .compact-card {
      border: 1px solid var(--line); background: var(--panel);
      border-radius: 6px; padding: 0.65rem 0.75rem;
      display: flex; flex-direction: column; gap: 0.25rem;
    }
    .compact-top { display: flex; justify-content: space-between; align-items: baseline; gap: 0.5rem; }
    .compact-airline { font-size: 0.72rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .compact-price { font-size: 1.05rem; font-weight: 700; color: var(--accent-dark); flex: none; }
    .compact-times { font-size: 0.82rem; font-weight: 600; }
    .compact-sub { font-size: 0.68rem; opacity: 0.70; }
    .compact-leg { font-size: 0.72rem; }
    .compact-leg .lbl { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.55; margin-right: 0.3rem; }
    .compact-badges { display: flex; flex-wrap: wrap; gap: 0.25rem; }
    .compact-badges .badge { font-size: 0.58rem; padding: 0.08rem 0.35rem; }
    .compact-warn { font-size: 0.64rem; color: var(--warn); }
    .compact-book {
      font-size: 0.64rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--accent-dark); text-decoration: none; margin-top: auto;
    }
    .compact-book:hover { text-decoration: underline; }

    /* landing */
    .capabilities {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 12rem), 1fr));
      gap: 0.75rem; margin-bottom: 2rem;
    }
    .cap {
      border: 1px solid var(--line); background: var(--panel);
      padding: 0.9rem 1rem; border-radius: 4px;
    }
    .cap .cap-title { font-size: 0.8rem; font-weight: 600; margin-bottom: 0.2rem; }
    .cap .cap-title span { color: var(--accent); margin-right: 0.35rem; }
    .cap .cap-body { font-size: 0.75rem; opacity: 0.72; line-height: 1.5; }

    .chips { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 2rem; }
    .chip {
      font-size: 0.75rem; padding: 0.45rem 0.8rem; border-radius: 999px;
      border: 1px solid var(--line); background: var(--panel);
      cursor: pointer; transition: all 0.15s; color: var(--ink);
    }
    .chip:hover { border-color: var(--accent); color: var(--accent-dark); }
    .suggest-chips { margin-bottom: 0; margin-top: 0.25rem; }
    .suggest-chips .chip { border-color: rgba(177, 71, 31, 0.4); color: var(--accent-dark); }
    .suggest-chips .chip::before { content: "→ "; opacity: 0.6; }
    .suggest-chips .chip:hover { background: var(--accent); color: #fff; }

    .messages { display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 2rem; }

    .msg-user {
      align-self: flex-end; max-width: 85%;
      background: var(--ink); color: var(--bg);
      padding: 0.6rem 1rem; border-radius: 14px 14px 3px 14px;
      font-size: 0.875rem; line-height: 1.55; white-space: pre-wrap;
    }

    .msg-assistant { display: flex; flex-direction: column; gap: 1rem; }
    .msg-text {
      font-size: 0.9rem; line-height: 1.65; white-space: pre-wrap; max-width: 46rem;
      border-left: 2px solid var(--accent); padding-left: 1rem;
    }

    .section-head { display: flex; justify-content: space-between; align-items: center; gap: 0.75rem; margin-bottom: 0.4rem; }
    .section-label {
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--accent-dark); font-weight: 600;
      white-space: pre-line;
    }
    .mini-toggle { display: inline-flex; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; background: var(--panel); flex: none; }
    .mini-toggle button {
      font-size: 0.6rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
      padding: 0.2rem 0.55rem; border: none; background: transparent; color: var(--ink);
      cursor: pointer; opacity: 0.6;
    }
    .mini-toggle button.active { background: var(--ink); color: var(--bg); opacity: 1; }

    .filter-bar { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; margin-bottom: 0.5rem; }
    .fselect {
      font-size: 0.68rem; padding: 0.26rem 0.5rem; border: 1px solid var(--line);
      border-radius: 6px; background: var(--panel); color: var(--ink);
    }
    .fcount { font-size: 0.66rem; opacity: 0.60; margin-left: auto; }
    .show-all {
      width: 100%; margin-top: 0.5rem; font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; padding: 0.5rem;
      border: 1px dashed rgba(28,26,21,0.30); border-radius: 6px;
      background: transparent; color: var(--accent-dark); cursor: pointer; transition: border-color 0.15s;
    }
    .show-all:hover { border-color: var(--accent); }
    .assumptions { font-size: 0.72rem; opacity: 0.60; margin-top: 0.35rem; }

    .flight-list { display: flex; flex-direction: column; gap: 0.6rem; }

    .flight-card {
      border: 1px solid var(--line); background: var(--panel);
      border-radius: 6px; padding: 1rem 1.1rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .flight-card:hover { border-color: rgba(28,26,21,0.35); box-shadow: 0 2px 10px rgba(28,26,21,0.06); }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.65rem; gap: 0.75rem; }
    .airline-id { display: flex; align-items: center; gap: 0.6rem; min-width: 0; }
    .airline-avatar {
      width: 2rem; height: 2rem; border-radius: 50%; flex: none;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.02em;
    }
    .card-airline { font-size: 0.875rem; font-weight: 600; }
    .card-code { font-size: 0.72rem; opacity: 0.60; }
    .card-price { font-size: 1.35rem; font-weight: 600; text-align: right; color: var(--accent-dark); }
    .card-price-note { font-size: 0.68rem; opacity: 0.60; text-align: right; }

    .route { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
    .route-end { text-align: center; flex: none; }
    .route-time { font-size: 1rem; font-weight: 600; }
    .route-port { font-size: 0.7rem; opacity: 0.65; }
    .route-mid { flex: 1; text-align: center; position: relative; }
    .route-line { border-top: 1px solid rgba(28,26,21,0.30); position: relative; top: 0.05rem; }
    .route-line::after {
      content: "✈"; position: absolute; right: -2px; top: -0.72rem;
      font-size: 0.8rem; color: var(--accent);
    }
    .route-meta { font-size: 0.68rem; opacity: 0.70; margin-top: 0.3rem; }

    .route-map {
      margin: 0.5rem 0 0.25rem; border: 1px solid var(--line); border-radius: 5px;
      overflow: hidden; background: #f0e6c8;
    }
    .route-map svg { display: block; width: 100%; height: 7rem; }

    .leg-label {
      display: inline-block; font-size: 0.62rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 0.1rem 0.45rem; border-radius: 3px; margin-bottom: 0.35rem;
      background: var(--info-bg); color: var(--info);
    }
    .leg-detail { font-size: 0.72rem; opacity: 0.68; margin: 0.15rem 0 0.4rem; }

    .badges { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 0.5rem 0 0.25rem; }
    .badge {
      font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
      padding: 0.15rem 0.5rem; border-radius: 3px;
    }
    .badge-direct { background: var(--good-bg); color: var(--good); }
    .badge-cheap { background: var(--warn-bg); color: var(--warn); }
    .badge-fast { background: var(--info-bg); color: var(--info); }
    .badge-plain { background: rgba(28,26,21,0.07); color: var(--ink); }

    .warning { font-size: 0.72rem; color: var(--warn); margin-top: 0.2rem; }
    .warning::before { content: "⚠ "; }

    .card-action {
      display: inline-block; margin-top: 0.6rem;
      font-size: 0.72rem; font-weight: 600; padding: 0.45rem 1rem;
      border: 1px solid var(--accent); border-radius: 4px;
      background: transparent; color: var(--accent-dark);
      cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase;
      text-decoration: none; transition: background 0.15s, color 0.15s;
    }
    .card-action:hover { background: var(--accent); color: #fff; }

    .date-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .date-cell {
      border: 1px solid var(--line); background: var(--panel); border-radius: 5px;
      padding: 0.5rem 0.75rem; cursor: pointer; text-align: left;
      transition: all 0.15s;
    }
    .date-cell:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(177,71,31,0.12); }
    .date-cell.cheapest { border-color: var(--good); background: var(--good-bg); }
    .date-cell .d { font-size: 0.72rem; display: block; opacity: 0.75; }
    .date-cell .p { font-size: 0.9rem; font-weight: 700; }
    .date-cell.cheapest .p { color: var(--good); }

    .input-area { border-top: 1px solid var(--line); padding-top: 1.25rem; }
    .input-row { display: flex; gap: 0.75rem; align-items: flex-end; }
    .text-input {
      flex: 1; font-size: 0.9rem; line-height: 1.5;
      border: 1px solid var(--line); border-radius: 8px;
      outline: none; padding: 0.65rem 0.9rem;
      background: var(--panel); color: var(--ink);
      resize: none; overflow-y: auto; max-height: 10rem; min-height: 2.9rem;
      transition: border-color 0.15s;
    }
    .text-input:focus { border-color: var(--accent); }
    .text-input::placeholder { color: rgba(28,26,21,0.40); }
    .submit-btn {
      font-size: 0.75rem; font-weight: 600; padding: 0.8rem 1.5rem;
      border: none; border-radius: 8px;
      background: var(--accent); color: #fff;
      cursor: pointer; letter-spacing: 0.08em; text-transform: uppercase;
      transition: background 0.15s;
    }
    .submit-btn:hover:not(:disabled) { background: var(--accent-dark); }
    .submit-btn:disabled { opacity: 0.35; cursor: default; }

    .loading { display: flex; align-items: center; gap: 0.6rem; font-size: 0.85rem; opacity: 0.75; }
    .stop-btn {
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 0.3rem 0.7rem; margin-left: 0.35rem;
      border: 1px solid var(--line); border-radius: 999px;
      background: transparent; color: var(--ink); cursor: pointer;
      transition: all 0.15s;
    }
    .stop-btn:hover { border-color: var(--accent); color: var(--accent-dark); }
    .msg-note { font-size: 0.8rem; opacity: 0.60; font-style: italic; }
    .loading-dot {
      width: 0.5rem; height: 0.5rem; border-radius: 50%; background: var(--accent);
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }

    .footer { text-align: center; margin-top: 3.5rem; font-size: 0.75rem; opacity: 0.60; }
    .footer a { text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 2px; }
  </style>
</head>
<body>
  <div class="container" x-data="flightApp()">
    <div class="header">
      <div>
        <h1>Flight <em>Assistant</em></h1>
        <p>Conversational flight search, powered by Claude and live Google Flights data.</p>
      </div>
      <div class="view-toggle">
        <button :class="viewMode === 'detailed' ? 'active' : ''" @click="setView('detailed')">Detailed</button>
        <button :class="viewMode === 'compact' ? 'active' : ''" @click="setView('compact')">Compact</button>
      </div>
    </div>

    <template x-if="!hasSearched">
      <div>
        <div class="capabilities">
          <div class="cap">
            <div class="cap-title"><span>1</span>Talk like a person, not a form</div>
            <div class="cap-body">Describe the trip the way you'd tell a friend — vague dates ("mid-October", "back by Friday"), cities instead of airport codes, budgets, loyalty status, "no budget airlines". The more intent you give, the better the recommendation.</div>
          </div>
          <div class="cap">
            <div class="cap-title"><span>2</span>Make it do the comparing</div>
            <div class="cap-body">Ask A-vs-B questions: two dates, two routings, an overnight stopover vs the direct. It runs the searches side by side with real total prices — round trips and multi-city are priced as one ticket.</div>
          </div>
          <div class="cap">
            <div class="cap-title"><span>3</span>Push back and iterate</div>
            <div class="cap-body">Results are a conversation. Tap a suggested follow-up or type your own — "only nonstops", "is Saturday cheaper?", "what about Newark?" You can stop a search mid-way to correct it, and flip any result block to Compact for side-by-side scanning.</div>
          </div>
        </div>
      </div>
    </template>

    <div class="messages">
      <template x-for="(msg, i) in messages" :key="i">
        <div style="display:flex; flex-direction:column;">
          <div x-show="msg.role === 'user'" class="msg-user" x-text="msg.content"></div>
          <div x-show="msg.role === 'note'" class="msg-note" x-text="msg.content"></div>

          <div x-show="msg.role === 'assistant'" class="msg-assistant">
            <div class="msg-text" x-html="renderText(msg.content)"></div>

            <template x-for="(sec, si) in (msg.sections || [])" :key="si">
              <div>
                <div class="section-head">
                  <div class="section-label" x-text="sectionLabel(sec)"></div>
                  <div class="mini-toggle" x-show="sec.results && sec.results.length">
                    <button :class="sectionView(sec) === 'detailed' ? 'active' : ''" @click="sec._view = 'detailed'">Detail</button>
                    <button :class="sectionView(sec) === 'compact' ? 'active' : ''" @click="sec._view = 'compact'">Compact</button>
                  </div>
                </div>

                <div class="filter-bar" x-show="sec._expanded && sec.type !== 'dates'">
                  <select class="fselect" :value="(sec._filters || {}).sort || ''" @change="setF(sec, 'sort', $event.target.value)">
                    <option value="">Sort: best</option>
                    <option value="price">Sort: price</option>
                    <option value="duration">Sort: duration</option>
                    <option value="departure">Sort: departure</option>
                  </select>
                  <select class="fselect" :value="(sec._filters || {}).dep || ''" @change="setF(sec, 'dep', $event.target.value)">
                    <option value="">Depart: any time</option>
                    <option value="early">Before 8am</option>
                    <option value="morning">8am – 12pm</option>
                    <option value="afternoon">12pm – 6pm</option>
                    <option value="evening">After 6pm</option>
                  </select>
                  <select class="fselect" :value="(sec._filters || {}).maxDur || ''" @change="setF(sec, 'maxDur', $event.target.value)">
                    <option value="">Duration: any</option>
                    <template x-for="h in durationOptions(sec)" :key="h">
                      <option :value="h" x-text="'Under ' + h + 'h'" :selected="String((sec._filters || {}).maxDur) === String(h)"></option>
                    </template>
                  </select>
                  <select class="fselect" :value="(sec._filters || {}).airline || ''" @change="setF(sec, 'airline', $event.target.value)">
                    <option value="">Airline: any</option>
                    <template x-for="a in airlineOptions(sec)" :key="a.code">
                      <option :value="a.code" x-text="a.name" :selected="(sec._filters || {}).airline === a.code"></option>
                    </template>
                  </select>
                  <select class="fselect" x-show="allianceOptions(sec).length" :value="(sec._filters || {}).alliance || ''" @change="setF(sec, 'alliance', $event.target.value)">
                    <option value="">Alliance: any</option>
                    <template x-for="al in allianceOptions(sec)" :key="al">
                      <option :value="al" x-text="al" :selected="(sec._filters || {}).alliance === al"></option>
                    </template>
                  </select>
                  <select class="fselect" :value="(sec._filters || {}).stops ?? ''" @change="setF(sec, 'stops', $event.target.value)">
                    <option value="">Stops: any</option>
                    <option value="0">Nonstop only</option>
                    <option value="1">1 stop max</option>
                  </select>
                  <span class="fcount" x-text="list(sec).length + ' of ' + (sec.results || []).length + ' options'"></span>
                </div>

                <!-- one-way flights, compact -->
                <template x-if="sec.type === 'flights' && sec.results && sec.results.length && sectionView(sec) === 'compact'">
                  <div class="compact-grid">
                    <template x-for="(f, j) in visible(sec, 8)" :key="j">
                      <div class="compact-card">
                        <div class="compact-top">
                          <div class="compact-airline" x-text="f.airline"></div>
                          <div class="compact-price" x-text="formatPrice(f.price, f.currency)"></div>
                        </div>
                        <div class="compact-times" x-text="formatTime(f.legs[0].departure) + ' → ' + formatTime(f.legs[f.legs.length-1].arrival) + arrivalDay(f)"></div>
                        <div class="compact-sub" x-text="f.legs[0].from + '–' + f.legs[f.legs.length-1].to + ' · ' + formatDuration(f.duration) + ' · ' + stopsText(f.stops) + ((f.layovers || []).length ? ' via ' + f.layovers.map(l => l.airport).join(', ') : '')"></div>
                        <div class="compact-badges" x-show="(f.highlights || []).length">
                          <template x-for="(h, k) in f.highlights" :key="k"><span class="badge" :class="badgeClass(h)" x-text="h"></span></template>
                        </div>
                        <div class="compact-warn" x-show="(f.warnings || []).length" x-text="'⚠ ' + (f.warnings || []).length + ' caveat' + (f.warnings.length > 1 ? 's' : '') + ' — see Detailed'"></div>
                        <a :href="f.booking_url" target="_blank" rel="noopener noreferrer" class="compact-book">Book →</a>
                      </div>
                    </template>
                  </div>
                </template>

                <!-- one-way flights, detailed -->
                <template x-if="sec.type === 'flights' && sec.results && sec.results.length && sectionView(sec) === 'detailed'">
                  <div class="flight-list">
                    <template x-for="(f, j) in visible(sec, 5)" :key="j">
                      <div class="flight-card">
                        <div class="card-header">
                          <div class="airline-id">
                            <div class="airline-avatar" :style="'background:' + airlineColor(f.airline_code)" x-text="f.airline_code"></div>
                            <div>
                              <div class="card-airline" x-text="f.airline"></div>
                              <div class="card-code" x-text="flightCodes(f)"></div>
                            </div>
                          </div>
                          <div>
                            <div class="card-price" x-text="formatPrice(f.price, f.currency)"></div>
                            <div class="card-price-note">one-way, per person</div>
                          </div>
                        </div>
                        <div class="route">
                          <div class="route-end">
                            <div class="route-time" x-text="formatTime(f.legs[0].departure)"></div>
                            <div class="route-port" x-text="f.legs[0].from"></div>
                          </div>
                          <div class="route-mid">
                            <div class="route-line"></div>
                            <div class="route-meta" x-text="formatDuration(f.duration) + ' · ' + stopsText(f.stops)"></div>
                          </div>
                          <div class="route-end">
                            <div class="route-time" x-text="formatTime(f.legs[f.legs.length-1].arrival)"></div>
                            <div class="route-port" x-text="f.legs[f.legs.length-1].to + arrivalDay(f)"></div>
                          </div>
                        </div>
                        <template x-for="(lo, k) in (f.layovers || [])" :key="k">
                          <div class="leg-detail" x-text="layoverText(lo)"></div>
                        </template>
                        <div class="leg-detail" x-show="aircraftText(f)" x-text="aircraftText(f)"></div>
                        <div class="route-map" x-show="(f.route_points || []).length > 1" x-html="mapSvg(f.route_points)"></div>

                            </div>
                            <div class="route-end">

                        <div class="badges" x-show="it.outbound.stops === 0 && it.return.stops === 0">

                      </div>

                </template>

                <!-- multi-city itineraries, compact -->
                <template x-if="sec.type === 'multicity' && sec.results && sec.results.length && sectionView(sec) === 'compact'">
                  <div class="compact-grid">

                      <div class="compact-card">

                        </template>
                        <div class="compact-sub">all legs, one ticket</div>
                        <a :href="it.booking_url" target="_blank" rel="noopener noreferrer" class="compact-book">Book →</a>
                      </div>
                    </template>
                  </div>
                </template>

                <!-- multi-city itineraries, detailed -->
                <template x-if="sec.type === 'multicity' && sec.results && sec.results.length && sectionView(sec) === 'detailed'">
                  <div class="flight-list">
                    <template x-for="(it, j) in visible(sec, 5)" :key="j">
                      <div class="flight-card">
                        <div class="card-header">
                          <div class="airline-id">
                            <div class="airline-avatar" :style="'background:' + airlineColor(it.parts[0].airline_code)" x-text="it.parts[0].airline_code"></div>
                            <div>
                              <div class="card-airline" x-text="[...new Set(it.parts.map(p => p.airline))].join(' + ')"></div>
                              <div class="card-code" x-text="'Multi-city · ' + it.parts.length + ' legs'"></div>
                            </div>
                          </div>
                          <div>
                            <div class="card-price" x-text="formatPrice(it.total_price, it.currency)"></div>
                            <div class="card-price-note">total, all legs</div>
                          </div>
                        </div>
                        <template x-for="(p, k) in it.parts" :key="k">
                          <div :style="k > 0 ? 'margin-top: 0.5rem;' : ''">
                            <span class="leg-label" x-text="'Leg ' + (k+1) + ' · ' + formatDate(p.legs[0].departure.slice(0,10))"></span>
                            <div class="route">
                              <div class="route-end">
                                <div class="route-time" x-text="formatTime(p.legs[0].departure)"></div>
                                <div class="route-port" x-text="p.legs[0].from"></div>

                                <div class="route-meta" x-text="formatDuration(p.duration) + ' · ' + stopsText(p.stops)"></div>
                              </div>
                              <div class="route-end">
                                <div class="route-time" x-text="formatTime(p.legs[p.legs.length-1].arrival)"></div>
                                <div class="route-port" x-text="p.legs[p.legs.length-1].to"></div>
                              </div>
                            </div>
                            <template x-for="(lo, m) in (p.layovers || [])" :key="m">
                              <div class="leg-detail" x-text="layoverText(lo)"></div>
                            </template>
                            <div class="leg-detail" x-show="aircraftText(p)" x-text="aircraftText(p)"></div>
                            <template x-for="(w, m) in (p.warnings || [])" :key="'w'+m">
                              <div class="warning" x-text="w"></div>

                        <div class="route-map" x-show="multiCityPoints(it).length > 1" x-html="mapSvg(multiCityPoints(it))"></div>
                        <a :href="it.booking_url" target="_blank" rel="noopener noreferrer" class="card-action">Book on Google Flights</a>
                      </div>
                    </template>
                  </div>
                </template>

                <!-- flexible-date price grid -->
                <template x-if="sec.type === 'dates' && sec.dates && sec.dates.length">
                  <div class="date-grid">
                    <template x-for="(d, j) in sec.dates" :key="j">
                      <button class="date-cell" :class="d.cheapest ? 'cheapest' : ''" @click="pickDate(d)" :disabled="isLoading">
                        <span class="d" x-text="formatDate(d.date) + (d.return_date ? ' → ' + formatDate(d.return_date) : '')"></span>
                        <span class="p" x-text="formatPrice(d.price, d.currency)"></span>
                      </button>
                    </template>
                  </div>
                </template>

                <button class="show-all"
                        x-show="sec.type !== 'dates' && ((sec.results || []).length > (sectionView(sec) === 'compact' ? 8 : 5))"
                        @click="sec._expanded = !sec._expanded"
                        x-text="sec._expanded ? 'Show top picks only' : 'Show all ' + list(sec).length + ' options · filter & sort'"></button>

                <div class="assumptions" x-show="(sec.assumptions || []).length"
                     x-text="(sec.assumptions || []).map(a => '· ' + a).join('   ')"></div>
              </div>
            </template>

            <div class="chips suggest-chips"
                 x-show="!isLoading && i === messages.length - 1 && (msg.suggestions || []).length">
              <template x-for="(s, k) in (msg.suggestions || [])" :key="k">
                <button class="chip" @click="search(s)" x-text="s"></button>
              </template>
            </div>
          </div>

      </template>

      <div x-show="isLoading" class="loading">
        <div class="loading-dot"></div>
        <span x-text="loadingText"></span>
        <button type="button" class="stop-btn" @click="stop()">■ Stop</button>
      </div>
      <div x-ref="bottom"></div>
    </div>

    <div class="input-area">
      <form @submit.prevent="search()">
        <div class="input-row">
          <textarea
            x-ref="box"
            rows="1"
            class="text-input"
            x-model="input"
            @input="autosize()"
            @keydown.enter="onEnter($event)"
            placeholder="Ask anything — routes, dates, comparisons, budgets…"
          ></textarea>
          <button type="submit" class="submit-btn" :disabled="!input.trim()">Send</button>
        </div>
      </form>
    </div>

    <div class="footer">
      <a href="https://evanburkeen.com">Evan Burkeen</a>
    </div>
  </div>

  <script>
    function flightApp() {
      return {
        messages: [],
        input: '',
        isLoading: false,
        hasSearched: false,
        history: [],
        viewMode: localStorage.getItem('flightViewMode') || 'detailed',
        loadingText: 'Thinking…',
        loadingTimer: null,
        controller: null,
        reqId: 0,

        init() {
          // one shared coastline definition; every mini-map references it via <use>
          if (!document.getElementById('worldpath')) {
            const holder = document.createElement('div');
            holder.innerHTML = `<svg style="position:absolute;width:0;height:0" aria-hidden="true"><defs><path id="worldpath" d="${WORLD_PATH}"/></defs></svg>`;
            document.body.appendChild(holder.firstChild);
          }
        },

        scrollToBottom() {
          this.$nextTick(() => { this.$refs.bottom?.scrollIntoView({ behavior: 'smooth' }); });
        },

        setView(mode) {
          this.viewMode = mode;
          localStorage.setItem('flightViewMode', mode);
          // global switch resets any per-section overrides
          this.messages.forEach(m => (m.sections || []).forEach(s => { delete s._view; }));
        },

        sectionView(sec) {
          return sec._view || this.viewMode;
        },

        // --- instant client-side browse: filter/sort/expand over already-fetched results ---
        _legsOf(sec, x) {
          if (sec.type === 'itineraries') return x.outbound.legs;
          if (sec.type === 'multicity') return x.parts[0].legs;
          return x.legs;
        },
        _priceOf(sec, x) { return sec.type === 'flights' ? x.price : x.total_price; },
        _durOf(sec, x) {
          if (sec.type === 'itineraries') return (x.outbound.duration || 0) + (x.return.duration || 0);
          if (sec.type === 'multicity') return x.parts.reduce((s, p) => s + (p.duration || 0), 0);
          return x.duration;
        },
        _directOf(sec, x) {
          if (sec.type === 'itineraries') return x.outbound.stops === 0 && x.return.stops === 0;
          if (sec.type === 'multicity') return x.parts.every(p => p.stops === 0);
          return x.stops === 0;
        },

        _stopsOf(sec, x) {
          if (sec.type === 'itineraries') return Math.max(x.outbound.stops, x.return.stops);
          if (sec.type === 'multicity') return Math.max(...x.parts.map(p => p.stops));
          return x.stops;
        },
        _partsOf(sec, x) {
          return sec.type === 'itineraries' ? [x.outbound, x.return]
               : sec.type === 'multicity' ? x.parts : [x];
        },
        _airlinesOf(sec, x) {
          return this._partsOf(sec, x).flatMap(p => (p.legs || []).map(l => l.airline_code));
        },

        list(sec) {
          let rs = sec.results || [];
          const f = sec._filters || {};
          if (f.dep) {
            const inB = (h, b) => b === 'early' ? h < 8 : b === 'morning' ? (h >= 8 && h < 12) : b === 'afternoon' ? (h >= 12 && h < 18) : h >= 18;
            rs = rs.filter(x => {
              const t = this._legsOf(sec, x)[0].departure;
              return inB(t ? parseInt(t.slice(11, 13), 10) : 0, f.dep);
            });
          }
          if (f.maxDur) rs = rs.filter(x => (this._durOf(sec, x) ?? 1e9) <= f.maxDur * 60);
          if (f.airline) rs = rs.filter(x => this._airlinesOf(sec, x).includes(f.airline));
          if (f.alliance) rs = rs.filter(x => this._partsOf(sec, x).some(p => p.alliance === f.alliance));
          if (f.stops !== '' && f.stops != null) rs = rs.filter(x => this._stopsOf(sec, x) <= +f.stops);
          if (f.sort === 'price') rs = [...rs].sort((a, b) => (this._priceOf(sec, a) ?? 1e9) - (this._priceOf(sec, b) ?? 1e9));
          else if (f.sort === 'duration') rs = [...rs].sort((a, b) => (this._durOf(sec, a) ?? 1e9) - (this._durOf(sec, b) ?? 1e9));
          else if (f.sort === 'departure') rs = [...rs].sort((a, b) => (this._legsOf(sec, a)[0].departure || '').localeCompare(this._legsOf(sec, b)[0].departure || ''));
          return rs;
        },

        durationOptions(sec) {
          const durs = (sec.results || []).map(x => this._durOf(sec, x)).filter(Boolean);
          if (!durs.length) return [];
          const minH = Math.min(...durs) / 60, maxH = Math.max(...durs) / 60;
          return [4, 6, 8, 10, 12, 15, 18, 24, 30, 36, 48].filter(h => h > minH && h < maxH).slice(0, 4);
        },

        airlineOptions(sec) {
          const seen = new Map();
          for (const x of sec.results || []) {
            for (const p of this._partsOf(sec, x)) {
              if (p.airline_code && !seen.has(p.airline_code)) seen.set(p.airline_code, p.airline);
            }
          }
          return [...seen].map(([code, name]) => ({ code, name })).sort((a, b) => (a.name || '').localeCompare(b.name || ''));
        },

        allianceOptions(sec) {
          const seen = new Set();
          for (const x of sec.results || []) {
            for (const p of this._partsOf(sec, x)) if (p.alliance) seen.add(p.alliance);
          }
          return [...seen].sort();
        },

        visible(sec, previewN) {
          const rs = this.list(sec);
          return sec._expanded ? rs : rs.slice(0, previewN);
        },

        setF(sec, key, value) {
          if (!sec._filters) sec._filters = {};
          sec._filters[key] = value;
        },


        multiCityPoints(it) {
          const pts = [];
          (it.parts || []).forEach(p => (p.route_points || []).forEach(pt => {
            if (!pts.length || pts[pts.length - 1].code !== pt.code) pts.push(pt);
          }));
          return pts;
        },

        autosize() {
          const el = this.$refs.box;
          if (!el) return;
          el.style.height = 'auto';
          el.style.height = Math.min(el.scrollHeight, 160) + 'px';
        },

        onEnter(e) {
          if (e.shiftKey) return; // allow newline
          e.preventDefault();
          this.search();
        },

        startLoadingCycle() {
          const phases = ['Thinking…', 'Searching live fares…', 'Comparing options…', 'Still working — big searches take a moment…'];
          let i = 0;
          this.loadingText = phases[0];
          this.loadingTimer = setInterval(() => {
            i = Math.min(i + 1, phases.length - 1);
            this.loadingText = phases[i];
          }, 6000);
        },

        stopLoadingCycle() {
          clearInterval(this.loadingTimer);
        },

        stop(silent) {
          if (!this.isLoading) return;
          this.controller?.abort();
          this.isLoading = false;
          this.stopLoadingCycle();
          // mark the interruption so Claude reads the next message as a correction
          this.history.push({ role: 'assistant', content: '(Search interrupted by the user before results came back.)' });
          this.history = this.history.slice(-12);
          if (!silent) {
            this.messages.push({ role: 'note', content: 'Search stopped — tell me what to change.' });
            this.scrollToBottom();
          }
        },

        async search(queryOverride) {
          const q = (queryOverride || this.input).trim();
          if (!q) return;
          if (this.isLoading) this.stop(true); // correcting mid-search: cancel and restart

          const myReq = ++this.reqId;
          this.controller = new AbortController();

          this.input = '';
          this.$nextTick(() => this.autosize());
          this.hasSearched = true;
          this.messages.push({ role: 'user', content: q });
          this.isLoading = true;
          this.startLoadingCycle();
          this.scrollToBottom();

          // record the user turn now so a stopped search still leaves context
          this.history.push({ role: 'user', content: q });

          try {
            const res = await fetch('/api/search', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ query: q, history: this.history.slice(0, -1) }),
              signal: this.controller.signal,
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            if (myReq !== this.reqId) return; // superseded by a newer request

            this.history.push({ role: 'assistant', content: data.message });
            this.history = this.history.slice(-12);

            this.messages.push({
              role: 'assistant',
              content: data.message,
              sections: data.sections || [],
              suggestions: data.suggestions || [],
            });
          } catch (err) {
            if (err.name === 'AbortError') return; // stop() already recorded the interruption
            if (myReq !== this.reqId) return;
            this.messages.push({ role: 'assistant', content: `Something went wrong: ${err.message}. Try again in a moment.`, sections: [] });
          } finally {
            if (myReq === this.reqId) {
              this.isLoading = false;
              this.stopLoadingCycle();
              // no auto-scroll on completion — stay where the reader is
            }
          }
        },

        pickDate(d) {
          let q = `Show me the flights for ${d.date}`;
          if (d.return_date) q += `, returning ${d.return_date}`;
          this.search(q);
        },

        sectionLabel(sec) {
          const msg = sec.message || '';
          return msg.split('\n')[0];
        },

        renderText(t) {
          const esc = (t || '')
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          return esc.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        },

        aircraftText(f) {
          const legs = f.legs || [];
          return [...new Set(legs.map(l => l.aircraft).filter(Boolean))].join(' + ');
        },

        mapSvg(points, returnPoints) {
          const pts = (points || []).filter(p => p && p.lat != null);
          if (pts.length < 2) return '';
          // equirectangular, same frame as WORLD_PATH: x = lon+180, y = 90-lat
          let xs = pts.map(p => p.lon + 180);
          const span = Math.max(...xs) - Math.min(...xs);
          if (span > 180) xs = xs.map(x => (x < 180 ? x + 360 : x)); // antimeridian wrap
          const ys = pts.map(p => 90 - p.lat);
          const P = pts.map((p, i) => ({ x: xs[i], y: ys[i], code: p.code }));

          let minX = Math.min(...xs), maxX = Math.max(...xs);
          let minY = Math.min(...ys), maxY = Math.max(...ys);
          const padX = Math.max((maxX - minX) * 0.35, 6);
          const padY = Math.max((maxY - minY) * 0.5, 5);
          minX -= padX; maxX += padX; minY -= padY; maxY += padY;
          // widen to a pleasant aspect ratio (~3:1)
          const w = maxX - minX, h = maxY - minY;
          if (w / h < 2.6) { const extra = (h * 2.6 - w) / 2; minX -= extra; maxX += extra; }
          else if (w / h > 4.5) { const extra = (w / 4.5 - h) / 2; minY -= extra; maxY += extra; }

          const vb = `${minX.toFixed(1)} ${minY.toFixed(1)} ${(maxX - minX).toFixed(1)} ${(maxY - minY).toFixed(1)}`;
          const sw = (maxX - minX) / 300; // stroke scale
          const arc = (a, b, lift) => {
            const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
            const dx = b.x - a.x, dy = b.y - a.y;
            const len = Math.hypot(dx, dy) || 1;
            const k = lift * Math.min(len * 0.18, 6);
            return `M${a.x} ${a.y} Q${mx - dy / len * k} ${my - dx / len * -k} ${b.x} ${b.y}`;
          };
          let route = '';
          for (let i = 0; i < P.length - 1; i++) route += `<path d="${arc(P[i], P[i+1], 1)}" fill="none" stroke="#b1471f" stroke-width="${sw * 2}"/>`;
          const dots = P.map((p, i) => {
            const end = i === 0 || i === P.length - 1;
            const nearTop = p.y < minY + (maxY - minY) * 0.24;
            const labelY = nearTop ? p.y + sw * 12 : p.y - sw * 5;
            return `<circle cx="${p.x}" cy="${p.y}" r="${sw * (end ? 3.2 : 2.2)}" fill="${end ? '#1c1a15' : '#b1471f'}"/>` +
                   `<text x="${p.x}" y="${labelY}" font-size="${sw * 9}" text-anchor="middle" fill="#1c1a15" font-family="Inter, sans-serif" font-weight="600">${p.code}</text>`;
          }).join('');
          return `<svg viewBox="${vb}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">` +
            `<use href="#worldpath" fill="#e3d5ae" stroke="#cbb987" stroke-width="${sw * 0.6}"/>` +
            `<use href="#worldpath" transform="translate(360,0)" fill="#e3d5ae" stroke="#cbb987" stroke-width="${sw * 0.6}"/>` +
            route + dots + `</svg>`;
        },

        airlineColor(code) {
          const palette = ['#0f4c5c', '#b1471f', '#5b21b6', '#166534', '#92400e', '#1e3a8a', '#9d174d', '#374151'];
          let h = 0;
          for (const ch of (code || '??')) h = (h * 31 + ch.charCodeAt(0)) >>> 0;
          return palette[h % palette.length];
        },

        badgeClass(h) {
          const t = (h || '').toLowerCase();
          if (t.includes('direct')) return 'badge-direct';
          if (t.includes('cheap')) return 'badge-cheap';
          if (t.includes('fast') || t.includes('quick')) return 'badge-fast';
          return 'badge-plain';
        },

        flightCodes(f) {
          const codes = (f.legs || []).map(l => l.airline_code + ' ' + l.flight_number).join(' · ');
          return f.alliance ? codes + ' · ' + f.alliance : codes;
        },

        stopsText(stops) {
          return stops === 0 ? 'Direct' : stops + ' stop' + (stops > 1 ? 's' : '');
        },

        arrivalDay(f) {
          const legs = f.legs || [];
          if (!legs.length) return '';
          const dep = (legs[0].departure || '').slice(0, 10);
          const arr = (legs[legs.length - 1].arrival || '').slice(0, 10);
          if (!dep || !arr || dep === arr) return '';
          const days = Math.round((new Date(arr + 'T12:00:00') - new Date(dep + 'T12:00:00')) / 86400000);
          return days > 0 ? ` +${days}` : '';
        },

        layoverText(lo) {
          const dur = lo.duration ? Math.floor(lo.duration / 60) + 'h ' + (lo.duration % 60) + 'm' : '';
          return `Layover: ${dur} in ${lo.city || lo.airport} (${lo.airport})`;
        },

        formatPrice(p, currency) {
          if (p == null) return '—';
          try {
            return new Intl.NumberFormat('en-US', {
              style: 'currency', currency: currency || 'USD',
              minimumFractionDigits: 0, maximumFractionDigits: 0,
            }).format(p);
          } catch { return (currency || '$') + ' ' + Math.round(p); }
        },

        formatTime(t) {
          if (!t) return '—';
          if (t.includes('T')) return t.split('T')[1]?.slice(0, 5) || '—';
          return t.slice(0, 5);
        },

        formatDate(d) {
          if (!d) return '';
          const dt = new Date(d + 'T12:00:00');
          return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        },

        formatDuration(mins) {
          if (!mins) return '';
          return `${Math.floor(mins / 60)}h ${mins % 60}m`;
        },
      };
    }
  </script>
</body>
</html>
