<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flight Search — Evan Burkeen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f7eed2;
      color: #000;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; }
    button, input { font-family: inherit; }

    .container { max-width: 56rem; margin: 0 auto; padding: 3rem 1.5rem; }

    .header { margin-bottom: 3rem; }
    .header h1 { font-size: 2.25rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 0.25rem; }
    .header p { font-size: 0.875rem; opacity: 0.72; }

    .messages { display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 2rem; }

    .msg-system {
      font-size: 0.875rem;
      line-height: 1.6;
      white-space: pre-line;
      border-left: 2px solid #000;
      padding-left: 1rem;
      opacity: 0.78;
    }

    .msg-user { text-align: right; font-size: 0.875rem; }

    .msg-assistant { display: flex; flex-direction: column; gap: 1rem; }
    .msg-text { font-size: 0.875rem; line-height: 1.6; white-space: pre-line; opacity: 0.90; }

    .outbound-summary {
      padding: 1rem;
      border: 1px solid rgba(0,0,0,0.20);
      background: rgba(0,0,0,0.03);
      margin-bottom: 0.5rem;
    }
    .outbound-label {
      font-size: 0.75rem;
      opacity: 0.60;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.25rem;
    }
    .outbound-airline { font-size: 0.875rem; font-weight: 500; }
    .outbound-detail { font-size: 0.75rem; opacity: 0.72; }

    .flight-list { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1.5rem; }

    .flight-card {
      border: 1px solid rgba(0,0,0,0.12);
      padding: 1rem;
      transition: opacity 0.15s;
      cursor: default;
    }
    .flight-card:hover { opacity: 0.92; }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
    .card-airline { font-size: 0.875rem; font-weight: 500; margin-bottom: 0.125rem; }
    .card-code { font-size: 0.75rem; opacity: 0.60; }
    .card-price { font-size: 1.25rem; font-weight: 400; text-align: right; }
    .card-cabin { font-size: 0.75rem; opacity: 0.60; text-align: right; }

    .card-details { font-size: 0.75rem; opacity: 0.78; margin-bottom: 0.5rem; }
    .card-aircraft { font-size: 0.75rem; opacity: 0.72; margin-top: 0.125rem; }

    .score-bar-track { height: 1px; background: rgba(0,0,0,0.12); margin-bottom: 0.5rem; }
    .score-bar-fill { height: 1px; background: #000; transition: width 0.5s; }

    .highlights { display: flex; flex-direction: column; gap: 0.125rem; margin-bottom: 0.5rem; }
    .highlight { font-size: 0.75rem; opacity: 0.72; }

    .card-extras {
      border-top: 1px solid rgba(0,0,0,0.08);
      padding-top: 0.5rem;
      margin-bottom: 0.5rem;
      display: flex; flex-direction: column; gap: 0.125rem;
    }
    .card-extra { font-size: 0.75rem; opacity: 0.72; }

    .card-action {
      display: block;
      width: 100%;
      text-align: center;
      font-size: 0.75rem;
      padding: 0.5rem;
      border: 1px solid #000;
      background: transparent;
      color: #000;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }
    .card-action:hover { background: #000; color: #fff; }
    .card-action:disabled { opacity: 0.30; cursor: default; }
    .card-action:disabled:hover { background: transparent; color: #000; }

    .input-area { border-top: 1px solid rgba(0,0,0,0.12); padding-top: 1.5rem; }
    .input-row { display: flex; gap: 0.75rem; }
    .text-input {
      flex: 1;
      font-size: 0.875rem;
      border: none;
      border-bottom: 1px solid rgba(0,0,0,0.25);
      outline: none;
      padding: 0.5rem 0;
      background: transparent;
      color: #000;
    }
    .text-input::placeholder { color: rgba(0,0,0,0.40); }
    .submit-btn {
      font-size: 0.75rem;
      padding: 0.5rem 1.5rem;
      border: 1px solid #000;
      background: transparent;
      color: #000;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: background 0.15s, color 0.15s;
    }
    .submit-btn:hover:not(:disabled) { background: #000; color: #fff; }
    .submit-btn:disabled { opacity: 0.30; cursor: default; }

    .powered-by { margin-top: 1rem; font-size: 0.75rem; opacity: 0.60; }
    .loading { font-size: 0.875rem; opacity: 0.60; }

    .footer { text-align: center; margin-top: 4rem; font-size: 0.75rem; opacity: 0.60; }
    .footer a { text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 2px; }
    .footer a:hover { opacity: 0.72; }
  </style>
</head>
<body>
  <div class="container" x-data="flightApp()">
    <div class="header">
      <h1>Flight Search</h1>
      <p>AI-powered</p>
    </div>

    <div class="messages">
      <template x-for="(msg, i) in messages" :key="i">
        <div>
          <div x-show="msg.role === 'system'" class="msg-system" x-text="msg.content"></div>

          <div x-show="msg.role === 'user'" class="msg-user">
            → <span x-text="msg.content"></span>
          </div>

          <div x-show="msg.role === 'assistant'" class="msg-assistant">
            <div class="msg-text" x-text="msg.content"></div>

            <div x-show="msg.isReturn && msg.selectedOutbound" class="outbound-summary">
              <div class="outbound-label">Selected Outbound</div>
              <div class="outbound-airline" x-text="msg.selectedOutbound ? msg.selectedOutbound.airline + ' (' + msg.selectedOutbound.airline_code + ') · ' + formatPrice(msg.selectedOutbound.price) : ''"></div>
              <div class="outbound-detail" x-text="msg.selectedOutbound ? formatTime(msg.selectedOutbound.departure_time) + ' → ' + formatTime(msg.selectedOutbound.arrival_time) + ' · ' + (msg.selectedOutbound.stops === 0 ? 'Direct' : msg.selectedOutbound.stops + ' stop(s)') : ''"></div>
            </div>

            <div x-show="msg.results && msg.results.length > 0" class="flight-list">
              <template x-for="(flight, j) in (msg.results || []).slice(0, 5)" :key="j">
                <div class="flight-card">
                  <div class="card-header">
                    <div>
                      <div class="card-airline" x-text="flight.airline"></div>
                      <div class="card-code" x-text="flight.airline_code + ' · ' + flight.alliance"></div>
                    </div>
                    <div>
                      <div class="card-price" x-text="formatPrice(flight.price)"></div>
                      <div class="card-cabin" x-text="flight.cabin_class.replace('_', ' ')"></div>
                    </div>
                  </div>

                  <div class="card-details">
                    <div x-text="formatTime(flight.departure_time) + ' → ' + formatTime(flight.arrival_time) + ' · ' + formatDuration(flight.duration) + ' · ' + (flight.stops === 0 ? 'Direct' : flight.stops + ' stop' + (flight.stops > 1 ? 's' : ''))"></div>
                    <div class="card-aircraft" x-show="flight.aircraft && flight.aircraft !== 'N/A'" x-text="flight.aircraft"></div>
                  </div>

                  <div class="score-bar-track">
                    <div class="score-bar-fill" :style="'width: ' + flight.score + '%'"></div>
                  </div>

                  <div x-show="flight.highlights && flight.highlights.length > 0" class="highlights">
                    <template x-for="(h, k) in flight.highlights" :key="k">
                      <div class="highlight" x-text="h"></div>
                    </template>
                  </div>

                  <div x-show="flight.details && (flight.details.refundable || flight.details.carry_on || flight.details.checked_bags)" class="card-extras">
                    <div x-show="flight.details && flight.details.refundable" class="card-extra" x-text="flight.details ? flight.details.refundable : ''"></div>
                    <div x-show="flight.details && flight.details.carry_on" class="card-extra" x-text="'Carry-on: ' + (flight.details ? flight.details.carry_on : '')"></div>
                    <div x-show="flight.details && flight.details.checked_bags" class="card-extra" x-text="'Checked bag: ' + (flight.details ? flight.details.checked_bags : '')"></div>
                  </div>

                  <template x-if="msg.isOutbound">
                    <button class="card-action" @click="selectOutbound(flight)" :disabled="isLoading">Select Outbound</button>
                  </template>
                  <template x-if="msg.isReturn && msg.selectedOutbound">
                    <a :href="flight.booking_url" target="_blank" rel="noopener noreferrer" class="card-action">
                      Book Round Trip · <span x-text="formatPrice((msg.selectedOutbound ? msg.selectedOutbound.price : 0) + flight.price)"></span>
                    </a>
                  </template>
                  <template x-if="!msg.isOutbound && !msg.isReturn">
                    <a :href="flight.booking_url" target="_blank" rel="noopener noreferrer" class="card-action">
                      Book on <span x-text="flight.airline_code"></span>
                    </a>
                  </template>
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>

      <div x-show="isLoading" class="loading">Searching...</div>
      <div x-ref="bottom"></div>
    </div>

    <div class="input-area">
      <form @submit.prevent="search">
        <div class="input-row">
          <input
            type="text"
            class="text-input"
            x-model="input"
            placeholder="Describe your flight..."
            :disabled="isLoading"
          />
          <button type="submit" class="submit-btn" :disabled="isLoading || !input.trim()">Search</button>
        </div>
      </form>
      <div class="powered-by">Powered by Google Flights + Claude AI</div>
    </div>

    <div class="footer">
      <a href="https://evanburkeen.com">Evan Burkeen</a>
    </div>
  </div>

  <script>
    function flightApp() {
      return {
        messages: [
          {
            role: 'system',
            content: "I'm your flight assistant. Natural language works—just describe what you need.\n\nExamples:\n• \"JFK to London March 21st, direct if possible\"\n• \"Miami round trip Feb 5-8, no budget airlines\"\n• \"San Francisco next week, I have Delta status\""
          }
        ],
        input: '',
        isLoading: false,
        selectedOutbound: null,
        originalQuery: '',

        scrollToBottom() {
          this.$nextTick(() => {
            this.$refs.bottom?.scrollIntoView({ behavior: 'smooth' });
          });
        },

        async search() {
          const q = this.input.trim();
          if (!q || this.isLoading) return;

          this.input = '';
          this.originalQuery = q;
          this.selectedOutbound = null;
          this.messages.push({ role: 'user', content: q });
          this.isLoading = true;
          this.scrollToBottom();

          try {
            const res = await fetch('/api/search', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ query: q, searchType: 'outbound' }),
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);

            this.messages.push({
              role: 'assistant',
              content: data.message,
              results: data.results,
              isOutbound: data.isRoundTrip,
            });
          } catch (err) {
            this.messages.push({ role: 'assistant', content: `Error: ${err.message}` });
          } finally {
            this.isLoading = false;
            this.scrollToBottom();
          }
        },

        async selectOutbound(flight) {
          this.selectedOutbound = flight;
          this.isLoading = true;
          this.messages.push({ role: 'assistant', content: 'Searching return flights...' });
          this.scrollToBottom();

          try {
            const res = await fetch('/api/search', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                query: this.originalQuery,
                searchType: 'return',
                selectedOutbound: flight,
              }),
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);

            this.messages.splice(-1, 1, {
              role: 'assistant',
              content: data.message,
              results: data.results,
              isReturn: true,
              selectedOutbound: flight,
            });
          } catch (err) {
            this.messages.splice(-1, 1, { role: 'assistant', content: `Error: ${err.message}` });
          } finally {
            this.isLoading = false;
            this.scrollToBottom();
          }
        },

        formatPrice(p) {
          return new Intl.NumberFormat('en-US', {
            style: 'currency', currency: 'USD',
            minimumFractionDigits: 0, maximumFractionDigits: 0,
          }).format(p || 0);
        },

        formatTime(t) {
          if (!t) return '—';
          // Handles both "HH:MM" and ISO datetime strings
          if (t.includes('T')) return t.split('T')[1]?.slice(0, 5) || '—';
          return t.slice(0, 5);
        },

        formatDuration(mins) {
          if (!mins) return 'N/A';
          return `${Math.floor(mins / 60)}h ${mins % 60}m`;
        },
      };
    }
  </script>
</body>
</html>
